<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>家族よてい</title>
  <style>
    :root { --pri: #ff8a65; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f3ef;
      color: #333;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--pri);
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .month-label {
      flex: 1;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    .month-label:active { opacity: 0.7; }
    .hbtn {
      background: rgba(255,255,255,0.22);
      border: none;
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hbtn:active { background: rgba(255,255,255,0.42); }

    /* ── Sync indicator ── */
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .sync-dot.ok      { background: #a5f3a5; }
    .sync-dot.syncing { background: #ffe082; }
    .sync-dot.error   { background: #ef9a9a; }

    /* ── Loading overlay ── */
    .loading {
      position: fixed; inset: 0;
      background: #f5f3ef;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      font-size: 0.95rem; color: #aaa;
    }
    .loading.hide { display: none; }

    /* ── Calendar ── */
    .cal { padding: 8px; }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.75rem;
      color: #999;
      padding-bottom: 6px;
    }
    .weekdays span:first-child { color: #e53935; }
    .weekdays span:last-child  { color: #1e88e5; }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .day {
      background: #fff;
      border-radius: 8px;
      min-height: 70px;
      padding: 5px;
      cursor: pointer;
      transition: box-shadow 0.12s;
    }
    .day:active   { box-shadow: 0 0 0 2px var(--pri); }
    .day.blank    { background: transparent; cursor: default; pointer-events: none; }
    .day.past     { opacity: 0.55; }
    .day.sun .dn  { color: #e53935; }
    .day.sat .dn  { color: #1e88e5; }
    .day.today .dn {
      background: var(--pri);
      color: #fff !important;
      border-radius: 50%;
    }

    .dn {
      font-size: 0.78rem;
      font-weight: 600;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2px;
    }

    .chips { display: flex; flex-direction: column; gap: 2px; }

    .chip {
      font-size: 0.62rem;
      padding: 2px 4px;
      border-radius: 3px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    .more {
      font-size: 0.6rem;
      color: #bbb;
      padding: 0 2px;
    }

    /* ── Backdrop ── */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.38);
      z-index: 20;
      display: none;
    }
    .backdrop.show { display: block; }

    /* ── Bottom sheet ── */
    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%; transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 480px;
      background: #fff;
      border-radius: 20px 20px 0 0;
      z-index: 21;
      padding: 14px 16px 28px;
      max-height: 82vh;
      overflow-y: auto;
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    }
    .sheet.show { transform: translateX(-50%) translateY(0); }

    .handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }

    .sheet-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; }

    /* Entry list */
    .entry-item {
      display: flex; align-items: center; gap: 8px;
      background: #f8f7f4; border-radius: 10px;
      padding: 9px 10px; margin-bottom: 7px;
    }
    .who-badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      color: #fff; white-space: nowrap; flex-shrink: 0;
    }
    .entry-text { flex: 1; font-size: 0.9rem; }
    .del-btn {
      background: none; border: none; color: #ccc;
      font-size: 1rem; cursor: pointer; padding: 2px 4px;
      border-radius: 4px; flex-shrink: 0;
    }
    .del-btn:active { color: #e53935; }

    .no-entry { text-align: center; color: #bbb; font-size: 0.85rem; padding: 10px 0 14px; }

    /* Add form */
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 6px 0 14px; }

    .form-label { font-size: 0.68rem; color: #aaa; letter-spacing: 0.06em; margin-bottom: 7px; }

    .member-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }

    .mbtn {
      padding: 6px 13px;
      border: 2px solid transparent;
      border-radius: 16px;
      font-size: 0.82rem; font-weight: 700;
      color: #fff; cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.1s, transform 0.08s;
    }
    .mbtn.sel     { opacity: 1; border-color: rgba(0,0,0,0.18); transform: scale(1.06); }
    .mbtn:active  { transform: scale(0.94); }

    .quick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .qbtn {
      padding: 6px 11px;
      border: 1px solid #ddd; border-radius: 14px;
      background: #fff; font-size: 0.8rem; color: #555;
      cursor: pointer; font-family: inherit;
      transition: background 0.1s;
    }
    .qbtn:active { background: #efefef; }

    .input-row { display: flex; gap: 8px; }

    .txt {
      flex: 1; padding: 10px 12px;
      border: 1px solid #ddd; border-radius: 10px;
      font-size: 0.9rem; font-family: inherit; outline: none;
    }
    .txt:focus { border-color: var(--pri); }

    .add-btn {
      padding: 10px 16px;
      background: var(--pri); color: #fff;
      border: none; border-radius: 10px;
      font-size: 0.9rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      white-space: nowrap;
    }
    .add-btn:active   { opacity: 0.8; }
    .add-btn:disabled { opacity: 0.3; pointer-events: none; }

    /* ── Settings ── */
    .settings {
      position: fixed; inset: 0;
      background: #f5f3ef; z-index: 30;
      padding: 16px; display: none;
      overflow-y: auto;
    }
    .settings.show { display: block; }

    .set-header {
      display: flex; align-items: center;
      gap: 12px; margin-bottom: 24px;
    }
    .back-btn {
      background: #e8e6e2; border: none;
      border-radius: 50%; width: 36px; height: 36px;
      font-size: 1rem; cursor: pointer;
    }
    .back-btn:active { background: #d0cec9; }
    .set-title { font-size: 1.05rem; font-weight: 700; }

    .set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

    .color-dot { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; }

    .set-input {
      flex: 1; padding: 10px 12px;
      border: 1px solid #ddd; border-radius: 10px;
      font-size: 0.95rem; font-family: inherit; outline: none;
    }
    .set-input:focus { border-color: var(--pri); }

    .save-btn {
      width: 100%; padding: 14px;
      background: var(--pri); color: #fff;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 10px;
      font-family: inherit;
    }
    .save-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading" id="loading">接続中…</div>

<!-- Header -->
<div class="header">
  <button class="hbtn" onclick="shiftMonth(-1)">‹</button>
  <div class="month-label" id="month-label" onclick="goToday()"></div>
  <button class="hbtn" onclick="shiftMonth(1)">›</button>
  <div class="sync-dot" id="sync-dot" title="同期状態"></div>
  <button class="hbtn" onclick="openSettings()">⚙</button>
</div>

<!-- Calendar -->
<div class="cal">
  <div class="weekdays">
    <span>日</span><span>月</span><span>火</span><span>水</span>
    <span>木</span><span>金</span><span>土</span>
  </div>
  <div class="days" id="grid"></div>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

<!-- Sheet -->
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div id="entry-list"></div>
  <hr class="divider">
  <div class="form-label">だれ？</div>
  <div class="member-row" id="member-row"></div>
  <div class="form-label">クイック入力</div>
  <div class="quick-row" id="quick-row"></div>
  <div class="input-row">
    <input class="txt" id="txt" placeholder="メモを入力…" maxlength="30" oninput="updateAddBtn()">
    <button class="add-btn" id="add-btn" onclick="addEntry()" disabled>追加</button>
  </div>
</div>

<!-- Settings -->
<div class="settings" id="settings">
  <div class="set-header">
    <button class="back-btn" onclick="closeSettings()">←</button>
    <span class="set-title">家族メンバー設定</span>
  </div>
  <div id="set-list"></div>
  <button class="save-btn" onclick="saveSettings()">保存する</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCfvqQWLB8NJqmaH0k2G0wPcbJJjz2Vu4A",
    authDomain: "kaimemo-58bad.firebaseapp.com",
    projectId: "kaimemo-58bad",
    storageBucket: "kaimemo-58bad.firebasestorage.app",
    messagingSenderId: "308069117698",
    appId: "1:308069117698:web:c61a57853abb7e8ffb1c1b"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const docRef = db.collection('family-schedule').doc('data');

  const COLORS = ['#ff8a65','#42a5f5','#66bb6a','#ab47bc','#ffa726','#26c6da'];
  const QUICK  = ['夕食不要','外出','帰り遅い','在宅','泊まり','お弁当','風呂','洗濯','トイレ掃除','家庭ごみ'];
  const DEFAULT_MEMBERS = [
    {name:'宏',color:'#ff8a65'},
    {name:'万',color:'#42a5f5'},
    {name:'克',color:'#66bb6a'}
  ];

  let members   = [...DEFAULT_MEMBERS];
  let entries   = {};
  let selMember = 0;
  let curDate   = null;
  let vy = new Date().getFullYear();
  let vm = new Date().getMonth();

  function setSyncDot(state) {
    const dot = document.getElementById('sync-dot');
    dot.className = 'sync-dot ' + state;
  }

  // ── Firestore リアルタイム同期 ────────────────────────────────────
  docRef.onSnapshot(snap => {
    if (snap.exists) {
      const data = snap.data();
      entries = data.entries || {};
      members = data.members || DEFAULT_MEMBERS;
    }
    document.getElementById('loading').classList.add('hide');
    setSyncDot('ok');
    renderCal();
    if (curDate) renderEntryList();
  }, () => setSyncDot('error'));

  // ── 書き込み ──────────────────────────────────────────────────────
  function persist() {
    setSyncDot('syncing');
    docRef.set({ entries, members });
  }

  // ── calendar ──────────────────────────────────────────────────────────────────
  function goToday() { vy = new Date().getFullYear(); vm = new Date().getMonth(); renderCal(); }
  function shiftMonth(d) {
    vm += d;
    if (vm < 0)  { vm = 11; vy--; }
    if (vm > 11) { vm = 0;  vy++; }
    renderCal();
  }

  function renderCal() {
    document.getElementById('month-label').textContent = `${vy}年 ${vm+1}月`;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const today = new Date();
    const first = new Date(vy, vm, 1).getDay();
    const days  = new Date(vy, vm+1, 0).getDate();

    for (let i = 0; i < first; i++) {
      const b = document.createElement('div');
      b.className = 'day blank';
      grid.appendChild(b);
    }

    for (let d = 1; d <= days; d++) {
      const dow = (first + d - 1) % 7;
      const ds  = `${vy}-${pad(vm+1)}-${pad(d)}`;
      const isToday = today.getFullYear()===vy && today.getMonth()===vm && today.getDate()===d;
      const isPast  = new Date(vy,vm,d) < new Date(today.getFullYear(),today.getMonth(),today.getDate());

      const cell = document.createElement('div');
      cell.className = 'day'
        + (dow===0?' sun':'') + (dow===6?' sat':'')
        + (isToday?' today':'') + (isPast&&!isToday?' past':'');
      cell.onclick = () => openSheet(ds);

      const dn = document.createElement('div');
      dn.className = 'dn';
      dn.textContent = d;
      cell.appendChild(dn);

      const es = entries[ds] || [];
      if (es.length) {
        const chips = document.createElement('div');
        chips.className = 'chips';
        es.slice(0,3).forEach(e => {
          const c = document.createElement('div');
          c.className = 'chip';
          c.style.background = e.color;
          c.textContent = e.text;
          chips.appendChild(c);
        });
        if (es.length > 3) {
          const m = document.createElement('div');
          m.className = 'more';
          m.textContent = `+${es.length-3}件`;
          chips.appendChild(m);
        }
        cell.appendChild(chips);
      }

      grid.appendChild(cell);
    }
  }

  // ── sheet ─────────────────────────────────────────────────────────────────────
  function openSheet(ds) {
    curDate = ds;
    const [y,m,d] = ds.split('-').map(Number);
    const dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
    document.getElementById('sheet-title').textContent = `${m}月${d}日（${dow}）`;
    document.getElementById('txt').value = '';
    updateAddBtn();
    renderEntryList();
    renderMemberRow();
    renderQuickRow();
    document.getElementById('backdrop').classList.add('show');
    document.getElementById('sheet').classList.add('show');
  }

  function closeSheet() {
    document.getElementById('backdrop').classList.remove('show');
    document.getElementById('sheet').classList.remove('show');
    curDate = null;
  }

  function renderEntryList() {
    const el = document.getElementById('entry-list');
    const es = entries[curDate] || [];
    if (!es.length) {
      el.innerHTML = '<div class="no-entry">まだ予定はありません</div>';
      return;
    }
    el.innerHTML = '';
    es.forEach((e, i) => {
      const row = document.createElement('div');
      row.className = 'entry-item';
      row.innerHTML = `
        <span class="who-badge" style="background:${e.color}">${e.who}</span>
        <span class="entry-text">${e.text}</span>
        <button class="del-btn" onclick="deleteEntry(${i})">✕</button>
      `;
      el.appendChild(row);
    });
  }

  function renderMemberRow() {
    const row = document.getElementById('member-row');
    row.innerHTML = '';
    members.forEach((m, i) => {
      if (!m.name) return;
      const btn = document.createElement('button');
      btn.className = 'mbtn' + (i===selMember?' sel':'');
      btn.style.background = m.color;
      btn.textContent = m.name;
      btn.onclick = () => { selMember = i; renderMemberRow(); };
      row.appendChild(btn);
    });
  }

  function renderQuickRow() {
    const row = document.getElementById('quick-row');
    row.innerHTML = '';
    QUICK.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'qbtn';
      btn.textContent = t;
      btn.onclick = () => { document.getElementById('txt').value = t; updateAddBtn(); addEntry(); };
      row.appendChild(btn);
    });
  }

  function updateAddBtn() {
    document.getElementById('add-btn').disabled = !document.getElementById('txt').value.trim();
  }

  function addEntry() {
    const text = document.getElementById('txt').value.trim();
    if (!text) return;
    const m = members[selMember];
    if (!entries[curDate]) entries[curDate] = [];
    entries[curDate].push({ who: m.name, color: m.color, text });
    persist();
    document.getElementById('txt').value = '';
    updateAddBtn();
  }

  function deleteEntry(i) {
    entries[curDate].splice(i, 1);
    if (!entries[curDate].length) delete entries[curDate];
    persist();
  }

  // ── settings ──────────────────────────────────────────────────────────────────
  function openSettings() {
    const list = document.getElementById('set-list');
    list.innerHTML = '';
    members.forEach((m, i) => {
      const row = document.createElement('div');
      row.className = 'set-row';
      const dot = document.createElement('div');
      dot.className = 'color-dot';
      dot.style.background = COLORS[i];
      const inp = document.createElement('input');
      inp.className = 'set-input';
      inp.value = m.name;
      inp.placeholder = `メンバー${i+1}`;
      inp.dataset.i = i;
      row.appendChild(dot);
      row.appendChild(inp);
      list.appendChild(row);
    });
    document.getElementById('settings').classList.add('show');
  }

  function closeSettings() {
    document.getElementById('settings').classList.remove('show');
  }

  function saveSettings() {
    document.querySelectorAll('.set-input').forEach(inp => {
      members[inp.dataset.i].name  = inp.value.trim();
      members[inp.dataset.i].color = COLORS[inp.dataset.i];
    });
    persist();
    closeSettings();
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  document.getElementById('txt').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEntry();
  });
</script>
</body>
</html>
